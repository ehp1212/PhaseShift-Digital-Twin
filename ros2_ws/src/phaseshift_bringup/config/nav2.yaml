controller_server:
  ros__parameters:
    use_sim_time: false
    robot_base_frame: base_footprint
    controller_frequency: 20.0

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 30.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.5
      stateful: true

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      publish_local_plan: true
      publish_evaluation: true
      publish_trajectories: true

      min_vel_x: 0.0
      max_vel_x: 0.26
      min_vel_y: 0.0
      max_vel_y: 0.0
      max_vel_theta: 1.0

      min_speed_xy: 0.0
      max_speed_xy: 0.26
      min_speed_theta: 0.0

      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2

      vx_samples: 30
      vy_samples: 1
      vtheta_samples: 20
      sim_time: 3.0

      linear_granularity: 0.05
      angular_granularity: 0.025

      trans_stopped_velocity: 0.1
      short_circuit_trajectory_evaluation: true
      stateful: true

      critics:
        - Oscillation
        - BaseObstacle
        - PathDist
        - GoalDist
        - PathAlign
        - GoalAlign
        - RotateToGoal

      BaseObstacle.scale: 0.3
      PathDist.scale: 8.0
      GoalDist.scale: 6.0
      PathAlign.scale: 1.0
      GoalAlign.scale: 1.0
      RotateToGoal.scale: 0.2
      PathAlign.forward_point_distance: 0.05
      GoalAlign.forward_point_distance: 0.05
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0


planner_server:
  ros__parameters:
    use_sim_time: false

    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"

    expected_planner_frequency: 10.0


map_server:
  ros__parameters:
    use_sim_time: false

    yaml_filename: ""


behavior_server:
  ros__parameters:
    use_sim_time: false

    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint

    recovery_plugins:
      - spin
      - backup
      - wait

    spin:
      plugin: "nav2_behaviors/Spin"

    backup:
      plugin: "nav2_behaviors/BackUp"

    wait:
      plugin: "nav2_behaviors/Wait"


local_costmap:
  local_costmap:
    ros__parameters:

      global_frame: odom
      robot_base_frame: base_footprint

      update_frequency: 5.0
      publish_frequency: 2.0

      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05

      robot_radius: 0.2

      plugins:
        - obstacle_layer
        - inflation_layer

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: velodyne scan

        velodyne:
          topic: /velodyne_points
          data_type: "PointCloud2"

          marking: true
          clearing: true

          obstacle_max_range: 4.0
          raytrace_max_range: 4.5

          min_obstacle_height: 0.05
          max_obstacle_height: 2.0

        scan:
          topic: /scan
          data_type: "LaserScan"

          marking: true
          clearing: true

          inf_is_valid: true
          obstacle_max_range: 3.0
          raytrace_max_range: .5
          max_obstacle_height: 2.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.8
        cost_scaling_factor: 5.0


global_costmap:
  global_costmap:
    ros__parameters:

      global_frame: map
      robot_base_frame: base_footprint

      update_frequency: 1.0
      publish_frequency: 1.0

      resolution: 0.05

      robot_radius: 0.2

      plugins:
        - static_layer
        - obstacle_layer
        - inflation_layer

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan

        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          inf_is_valid: true
          obstacle_max_range: 4.0
          raytrace_max_range: 4.5
          max_obstacle_height: 2.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.5


lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false

    autostart: false

    node_names:
      - map_server
      - amcl
      - planner_server
      - controller_server
      - bt_navigator
      - behavior_server