# ==============================
# BEHAVIOUR TREE NAVIGATOR
# ==============================
bt_navigator:
  ros__parameters:
    use_sim_time: false

    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom

    bt_loop_duration: 10
    default_server_timeout: 20

    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node

      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node

      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node

      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node

      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_recovery_node_bt_node

      - nav2_remove_passed_goals_action_bt_node


# ==============================
# CONTROLLER SERVER
# ==============================
controller_server:
  ros__parameters:
    use_sim_time: false
    robot_base_frame: base_footprint
    controller_frequency: 20.0

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 30.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.5
      stateful: true

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      publish_local_plan: true
      publish_evaluation: true
      publish_trajectories: true

      min_vel_x: 0.0
      max_vel_x: 0.26
      min_vel_y: 0.0
      max_vel_y: 0.0
      max_vel_theta: 1.5

      min_speed_xy: 0.0
      max_speed_xy: 0.26
      min_speed_theta: 0.0

      acc_lim_x: 2.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2

      vx_samples: 30
      vy_samples: 1
      vtheta_samples: 40
      sim_time: 3.0

      linear_granularity: 0.05
      angular_granularity: 0.025

      trans_stopped_velocity: 0.1
      short_circuit_trajectory_evaluation: true
      stateful: true

      critics:
        - Oscillation
        - BaseObstacle
        - PathDist
        - GoalDist
        - PathAlign
        - GoalAlign
        - RotateToGoal

      BaseObstacle.scale: 6.0
      PathDist.scale: 4.0
      GoalDist.scale: 6.0
      PathAlign.scale: 1.0
      GoalAlign.scale: 1.0
      RotateToGoal.scale: 0.2
      PathAlign.forward_point_distance: 0.05
      GoalAlign.forward_point_distance: 0.05
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0


# ==============================
# PLANNER SERVER
# ==============================
planner_server:
  ros__parameters:
    use_sim_time: false

    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"

    expected_planner_frequency: 10.0


# ==============================
# BEHAVIOUR SERVER
# ==============================
behavior_server:
  ros__parameters:
    use_sim_time: false

    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint

    recovery_plugins:
      - spin
      - backup
      - wait

    spin:
      plugin: "nav2_behaviors/Spin"

    backup:
      plugin: "nav2_behaviors/BackUp"

    wait:
      plugin: "nav2_behaviors/Wait"


# ==============================
# LOCAL COSTMAP
# ==============================
local_costmap:
  local_costmap:
    ros__parameters:

      global_frame: odom
      robot_base_frame: base_footprint

      update_frequency: 5.0
      publish_frequency: 2.0

      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05

      robot_radius: 0.2

      plugins:
        - obstacle_layer
        - inflation_layer

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: dynamic_points perception velodyne scan

        dynamic_points:
          topic: /perception_geometry/change_points
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "PointCloud2"

        perception:
          topic: /perception/obstacles
          data_type: PointCloud2
          marking: true
          clearing: false

          min_obstacle_height: -1.0
          max_obstacle_height: 2.0

          obstacle_max_range: 8.0
          raytrace_max_range: 8.0

        velodyne:
          topic: /velodyne_points
          data_type: "PointCloud2"

          marking: true
          clearing: true

          obstacle_max_range: 6.0
          raytrace_max_range: 6.5

          min_obstacle_height: 0.05
          max_obstacle_height: 2.0

        scan:
          topic: /scan
          data_type: "LaserScan"

          marking: true
          clearing: true

          inf_is_valid: true
          obstacle_max_range: 6.0
          raytrace_max_range: 6.0
          max_obstacle_height: 2.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 1.0
        cost_scaling_factor: 3.0


# ==============================
# GLOBAL COSTMAP
# ==============================
global_costmap:
  global_costmap:
    ros__parameters:

      global_frame: map
      robot_base_frame: base_footprint

      update_frequency: 1.0
      publish_frequency: 1.0

      resolution: 0.05

      robot_radius: 0.2

      plugins:
        - static_layer
        - obstacle_layer
        - inflation_layer

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /spatial_cost_field
        subscribe_to_updates: false

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: dynamic_points scan perception

        dynamic_points:
          topic: /perception_geometry/change_points
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "PointCloud2"

        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          inf_is_valid: true
          obstacle_max_range: 8.0
          raytrace_max_range: 8.0
          max_obstacle_height: 2.0

        perception:
          topic: /perception/obstacles
          data_type: PointCloud2
          marking: true
          clearing: false

          # observation_persistence: 2.0

          min_obstacle_height: -1.0
          max_obstacle_height: 2.0

          obstacle_max_range: 10.0
          raytrace_max_range: 10.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.8
        cost_scaling_factor: 4.0


# ==============================
# AMCL
# ==============================
amcl:
  ros__parameters:
    use_sim_time: false

    base_frame_id: base_footprint
    odom_frame_id: odom
    global_frame_id: map

    scan_topic: scan

    min_particles: 500
    max_particles: 2000

    update_min_d: 0.2
    update_min_a: 0.2

    resample_interval: 1
    transform_tolerance: 1.0


# ==============================
# MAP SERVER
# ==============================
map_server:
  ros__parameters:
    use_sim_time: false

    yaml_filename: ""


# ==============================
# LIFECYCLE MANAGER
# ==============================
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false

    autostart: false

    node_names:
      - map_server
      - amcl
      - planner_server
      - controller_server
      - bt_navigator
      - behavior_server