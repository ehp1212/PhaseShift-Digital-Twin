amcl:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_footprint
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: scan

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    use_velocity_scaled_lookahead_dist: false

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 10.0

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""  

local_costmap:
  local_costmap:
    ros__parameters:
      global_frame: odom
      robot_base_frame: base_footprint
      update_frequency: 5.0
      publish_frequency: 2.0
      resolution: 0.05
      rolling_window: true
      width: 5
      height: 5

global_costmap:
  global_costmap:
    ros__parameters:
      global_frame: map
      robot_base_frame: base_footprint
      update_frequency: 1.0
      publish_frequency: 1.0
      resolution: 0.05

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: false
    node_names:
      - controller_server
      - planner_server
      - bt_navigator
      - map_server